Name: 'OPC-UA'
Type: OPCUACategoryFolder
Children:
- Name: OPCUAServer
  Type: OPCUAServer
  Children:
  - Name: EndpointURL
    Type: PropertyType
    DataType: ResourceUri
    Value: "opc.tcp://localhost:59100"
  - Name: NodesToPublish
    Type: BaseObjectType
    Children:
    - Name: Configuration1
      Type: NodesToPublishConfigurationEntry
      Children:
      - Name: Nodes
        Type: BaseObjectType
        Children:
        - Name: Node1
          Type: NodePointer
          DataType: NodeId
          Value: "/Objects/Actividadvantage/Model"
          Children:
          - Name: Kind
            Type: PropertyType
            DataType: NodeId
          - Name: NodeClass
            Type: PropertyType
            DataType: NodePointerNodeClass
            Value: 2
      - Name: Users
        Type: BaseObjectType
        Children:
        - Name: User1
          Type: NodePointer
          DataType: NodeId
          Value: "/Objects/Actividadvantage/Security/Users/Admin"
          Children:
          - Name: Kind
            Type: PropertyType
            DataType: NodeId
            Value: "/Types/ObjectTypes/BaseObjectType/UserType"
          - Name: NodeClass
            Type: PropertyType
            DataType: NodePointerNodeClass
      - Name: PublishDynamicConfiguration
        Type: BaseDataVariableType
        DataType: Boolean
  - Name: MinimumMessageSecurityMode
    Type: PropertyType
    DataType: MessageSecurityModeEnum
  - Name: MinimumSecurityPolicy
    Type: PropertyType
    DataType: SecurityPolicyEnum
  - Name: MaxNumberOfConnections
    Type: BaseDataVariableType
    DataType: UInt32
    Value: 2
  - Name: ProductURI
    Type: BaseDataVariableType
    DataType: String
    Value: "urn:FactoryTalkOptixHMI:FTOptixApplication"
  - Name: ServerCertificateFile
    Type: PropertyType
    DataType: ResourceUri
    Value: "ns=7;%PROJECTDIR%/PKI/Own/Certs/optixhmi_cert.der"
  - Name: ServerPrivateKeyFile
    Type: PropertyType
    DataType: ResourceUri
    Value: "ns=7;%PROJECTDIR%/PKI/Own/Certs/optixhmi_cert.pem"
  - Name: CertificateIsExpired
    Type: BaseDataVariableType
    DataType: Boolean
    AccessLevel: Read
